```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#2193b0,#6dd5ed);
}

.calculator{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

#display{
    width:100%;
    height:70px;
    border:none;
    outline:none;
    text-align:right;
    padding:15px;
    font-size:2rem;
    border-radius:10px;
    margin-bottom:15px;
    background:white;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,80px);
    gap:10px;
}

button{
    height:70px;
    border:none;
    border-radius:10px;
    font-size:1.4rem;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#e2e8f0;
}

.operator{
    background:#3b82f6;
    color:white;
}

.equal{
    background:#10b981;
    color:white;
}

.clear{
    background:#ef4444;
    color:white;
}

</style>
</head>
<body>

<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="appendValue('/')">÷</button>
<button class="operator" onclick="appendValue('*')">×</button>
<button class="operator" onclick="appendValue('-')">−</button>

<button class="number" onclick="appendValue('7')">7</button>
<button class="number" onclick="appendValue('8')">8</button>
<button class="number" onclick="appendValue('9')">9</button>
<button class="operator" onclick="appendValue('+')">+</button>

<button class="number" onclick="appendValue('4')">4</button>
<button class="number" onclick="appendValue('5')">5</button>
<button class="number" onclick="appendValue('6')">6</button>
<button class="equal" onclick="calculate()">=</button>

<button class="number" onclick="appendValue('1')">1</button>
<button class="number" onclick="appendValue('2')">2</button>
<button class="number" onclick="appendValue('3')">3</button>
<button class="number" onclick="appendValue('.')">.</button>

<button class="number" onclick="appendValue('0')" style="grid-column:span 4;">
0
</button>

</div>

</div>

<script>

const display = document.getElementById("display");

function appendValue(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}

</script>

</body>
</html>
